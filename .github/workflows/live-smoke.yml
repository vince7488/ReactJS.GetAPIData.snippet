name: Optional live API smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '17 10 * * 1'

jobs:
  live-smoke:
    name: Live public API smoke
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      LIVE_API_SMOKE: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Create production build
        run: npm run build

      - name: Run optional live API smoke
        run: npm run test:e2e:live

      - name: Upload live smoke Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: live-smoke-playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload live smoke test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: live-smoke-test-results
          path: test-results
          if-no-files-found: ignore
